project: infusion-mnist
program: train_sweep.py
method: bayes
metric:
  name: results/mean_delta_prob
  goal: maximize

parameters:
  # Model parameters
  model_type:
    value: logistic  # Fixed to attention model only

  batch_size:
    values: [16, 32, 64, 128]

  samples_per_class:
    distribution: int_uniform
    min: 100
    max: 1000

  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01

  epochs:
    distribution: int_uniform
    min: 1
    max: 200

  # Hessian parameters
  damping:
    distribution: log_uniform_values
    min: 0.01
    max: 1.0

  # PGD parameters
  top_k:
    distribution: int_uniform
    min: 10
    max: 100

  epsilon:
    distribution: uniform
    min: 0.001
    max: 2.0

  alpha:
    distribution: log_uniform_values
    min: 0.001
    max: 0.1

  n_steps:
    values: [20, 50, 100, 200]

  random_seed:
    values: [12, 42, 52, 100, 256]
