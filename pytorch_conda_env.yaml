name: pytorch_env
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.10
  - pip
  - transformers
  - jupyterlab >=4.2,<5.0
  - notebook >=7.2,<8.0
  - ipykernel
  - pandas
  - numpy
  - scikit-learn
  - matplotlib
  - seaborn 
  - pip:
      - torch==2.7.0+cu128
      - torchvision>=0.16.0
      - accelerate>=0.31.0
      - einops>=0.8.0
      - einconv>=0.1.0
      - opt_einsum>=3.3.0
      - safetensors>=0.4.2
      - tqdm>=4.66.4
      - wandb==0.22.1
      - plotly==6.4.0
      - ipywidgets==8.1.8
      - anywidget==0.9.20
      - optuna==4.5.0
      - --extra-index-url https://download.pytorch.org/whl/cu128
